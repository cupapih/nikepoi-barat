

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Videy - Free and Simple Video Hosting</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #fff; 
        }
        video {
            background-color: #ffffff !important;
        }
        #ad-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            cursor: pointer;
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="root" class="min-h-screen flex flex-col">
        <header class="pt-3 pb-3 lg:pt-4 lg:pb-4">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-between">
                    <a href="/" class="flex items-center">
                        <span class="font-semibold text-[26px] tracking-[-2px] text-gray-900">videy</span>
                    </a>
                    <a href="/" class="flex items-center space-x-2 px-4 py-1.5 bg-gray-900 text-white font-semibold rounded-full hover:bg-gray-800 transition-colors text-[15px]">
                        <span>Upload</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="w-full max-w-[720px] mx-auto flex-grow px-0 md:px-4 md:mt-3">
            <div class="w-full flex justify-center">
                <div class="w-full" id="video-wrapper">
                    <div class="flex items-center justify-center w-full" style="height: 250px;">
                        <span class="text-gray-500 text-sm" id="loading-text">Memuat video...</span>
                    </div>
                </div>
            </div>

            <div class="w-full flex flex-col items-center mt-4 mb-0">
                <button onclick="shareVideo()" class="inline-flex items-center justify-center whitespace-nowrap text-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 text-gray-900 shadow-sm h-9 py-2 rounded-full px-6 gap-2 bg-gray-100 hover:bg-gray-200 font-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share w-[18px] h-[18px]">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" x2="12" y1="2" y2="15"></line>
                    </svg>
                    Share video
                </button>
            </div>
        </main>

        <footer class="pb-6 mt-10">
            <div class="max-w-6xl mx-auto px-6 lg:px-8">
                <div class="flex items-center justify-center space-x-8">
                    <a href="#" class="text-xs text-gray-500 hover:text-gray-900 transition-colors">Terms of Service</a>
                    <a href="#" class="text-xs text-gray-500 hover:text-gray-900 transition-colors">Report Abuse</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        window.onload = function() {
            const wrapper = document.getElementById('video-wrapper');
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('id');

            if (videoId) {
                const videoUrl = `https://cdn.videy.co/${videoId}.mp4`;
                wrapper.innerHTML = `
                    <video 
                        class="w-full md:rounded-[8px]" 
                        style="max-height: 520px; outline: none;" 
                        controls 
                        playsinline 
                        src="${videoUrl}">
                    </video>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="text-gray-500 text-sm p-4 text-center" style="height: 250px; display: flex; flex-direction: column; justify-content: center;">
                        <p class="font-semibold text-lg text-gray-800">Parameter Kosong</p>
                        <p class="mt-1">Gunakan format ?id=kodevideo</p>
                    </div>
                `;
            }

            if (window.name === 'ad_passed') {
                window.name = '';
            } else {
                const adOverlay = document.createElement('div');
                adOverlay.id = 'ad-overlay';
                document.body.appendChild(adOverlay);
                
                adOverlay.addEventListener('click', function(e) {
                    e.preventDefault();

                    // ========================================================================
                    // GANTI LINK IKLAN DI SINI
                    // Silakan ganti URL yang berwarna hijau/di dalam tanda kutip di bawah ini 
                    // dengan link iklan direct link milik Anda.
                    // Pastikan tidak menghapus tanda kutip ganda ("...") di awal dan akhir link.
                    // ========================================================================
                    const adUrl = "https://omg10.com/4/10390860";
                    // ========================================================================

                    const currentUrl = window.location.href; 
                    window.open(currentUrl, 'ad_passed');
                    window.location.href = adUrl;
                    adOverlay.remove();
                });
            }
        };

        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Videy',
                    url: window.location.href
                }).catch(console.error);
            } else {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert("Link berhasil disalin!");
            }
        }
    </script>
</body>
</html>
