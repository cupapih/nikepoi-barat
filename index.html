<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Player</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#fff;
}
#ad-overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:99999;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="max-w-3xl mx-auto p-3">
    <div id="player" class="w-full">
        <div class="text-center text-gray-500 py-20">Memuat...</div>
    </div>
</div>

<script>
function getVideoSource(url){
    // =============================
    // VIDEY
    // =============================
    if(url.includes("videy.co")){
        const idMatch = url.match(/id=([^&]+)/);
        if(idMatch){
            return {
                type:"mp4",
                src:`https://cdn.videy.co/${idMatch[1]}.mp4`
            };
        }
    }

    // =============================
    // MP4 DIRECT
    // =============================
    if(url.endsWith(".mp4")){
        return {
            type:"mp4",
            src:url
        };
    }

    // =============================
    // DOOSTREAM
    // =============================
    if(url.includes("doostream")){
        return {
            type:"iframe",
            src:url.replace("/e/", "/embed/")
        };
    }

    // =============================
    // VIPOY
    // =============================
    if(url.includes("vipoy")){
        return {
            type:"iframe",
            src:url
        };
    }

    // =============================
    // DEFAULT → IFRAME
    // =============================
    return {
        type:"iframe",
        src:url
    };
}

window.onload = function(){
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const player = document.getElementById("player");

    if(!url){
        player.innerHTML = `<div class="text-center py-20">Masukkan ?url=link_video</div>`;
        return;
    }

    const video = getVideoSource(url);

    if(video.type === "mp4"){
        player.innerHTML = `
        <video controls class="w-full rounded-lg" style="max-height:520px">
            <source src="${video.src}" type="video/mp4">
        </video>`;
    } else {
        player.innerHTML = `
        <iframe src="${video.src}" 
        class="w-full h-[500px] rounded-lg" 
        frameborder="0" 
        allowfullscreen></iframe>`;
    }

    // =============================
    // IKLAN OVERLAY
    // =============================
    if(window.name !== "ad_passed"){
        const ad = document.createElement("div");
        ad.id = "ad-overlay";
        document.body.appendChild(ad);

        ad.onclick = function(e){
            e.preventDefault();

            const adUrl = "https://omg10.com/4/10390860";

            window.open(location.href, "ad_passed");
            location.href = adUrl;

            ad.remove();
        }
    } else {
        window.name = "";
    }
}
</script>

</body>
</html>
